name: Ecommerce Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build project
        run: mvn clean compile

      - name: Run tests
        run: mvn clean test -DsuiteXmlFile=testng.xml
        env:
          CI: true

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        with:
         name: allure-results
         path: allure-results/